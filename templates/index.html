<!DOCTYPE html>
<html>

<head>
    <title>Sign Language Translation Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="container">
        <h2>Sign Language Translation Platform</h2>

        <form id="islForm">
            <input type="text" id="textInput" placeholder="Enter your sentence here" required>
            <button type="submit">Convert to ISL</button>
        </form>

        <div class="output" id="outputDiv">
            <!-- ISL result will appear here -->
        </div>
    </div>

    <script>
        const form = document.getElementById("islForm");
        const input = document.getElementById("textInput");
        const outputDiv = document.getElementById("outputDiv");

        form.addEventListener("submit", async (e) => {
            e.preventDefault(); // prevent page reload

            const text = input.value.trim();
            if (!text) return;

            const response = await fetch("/convert", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text })
            });

            const data = await response.json();
            const islWords = data.isl.split(" ");

            outputDiv.innerHTML = islWords
                .map(w => `<span>${w}</span>`)
                .join(" ");

            if (typeof playISLSequence === "function") {
                playISLSequence(islWords);
            }
        });
    </script>

    <div id="viewer"></div>

    <div class="reset">
        <label style="color:white; font-family:sans-serif;">
            <input type="radio" name="autoReset" id="autoResetOn" checked>
            Auto Reset ON
        </label>

        <label style="color:white; font-family:sans-serif; margin-left:10px;">
            <input type="radio" name="autoReset" id="autoResetOff">
            Auto Reset OFF
        </label>
    </div>

    <button id="btnME">ME</button>
    <button id="btnGO">GO</button>
    <button id="btnSCHOOL">SCHOOL</button>
    <button id="btnHello">HELLO</button>
    <button id="btnSIGN">SIGN</button>
    <button id="btnLANGUAGE">LANGUAGE</button>
    <button id="btnYES">YES</button>
    <button id="btnNO">NO</button>

    <button id="toggleBonePanel" style="
position:absolute;
top:20px;
right:20px;
z-index:1000;
padding:6px 10px;
cursor:pointer;
">
        Show Panel
    </button>

    <div id="boneControlPanel" style="
position:absolute;
top:60px;
right:20px;
background:#2222222c;
padding:15px;
color:white;
font-family:monospace;
width:250px;
border-radius:8px;
display:none;
">

        <select id="boneSelect"></select>

        <br><br>

        X: <span id="xVal">0</span>
        <input id="xSlider" type="range" min="-3.14" max="3.14" step="0.01">

        <br>

        Y: <span id="yVal">0</span>
        <input id="ySlider" type="range" min="-3.14" max="3.14" step="0.01">

        <br>

        Z: <span id="zVal">0</span>
        <input id="zSlider" type="range" min="-3.14" max="3.14" step="0.01">

        <br><br>

        <button id="copyBoneJson">Copy Bone JSON</button>

        <br><br>

        <button id="copyHandsPose">Copy Both Hands Pose</button>

        <br><br>

        <button id="mirrorRightToLeft">Mirror Right → Left</button>

        <br><br>

        <button id="resetPose">Reset Pose</button>

    </div>

    <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}

</script>

    <script type="module" src="{{ url_for('static', filename='js/index.js') }}"></script>


</body>

</html>
